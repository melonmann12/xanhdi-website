# Disable template caching for development hot-reloading
spring.thymeleaf.cache=false

# Server Port Configuration
server.port=8080

# ==========================================
# CẤU HÌNH KẾT NỐI SUPABASE (POSTGRESQL)
# ==========================================

# 1. Dùng port 6543 (Supabase Pooler) thay vì 5432 để tránh bị chặn bởi firewall
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0

# 2. Tài khoản mặc định (kèm theo mã dự án khi dùng Pooler để hỗ trợ mạng IPv4)
spring.datasource.username=postgres.ustnundvxlmxrxdavbym

# 3. Nhớ thay đúng mật khẩu dự án Supabase
spring.datasource.password=Hongquan@123

spring.datasource.driver-class-name=org.postgresql.Driver

# 4. Ép trực tiếp Dialect để Hibernate không cần phải tự dò qua metadata nữa
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 5. Các cấu hình bổ sung hỗ trợ debug
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 6. Cấu hình timeout để app không bị treo khi DB không kết nối được
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=5

# ==========================================
# CẤU HÌNH GMAIL SMTP
# ==========================================
# ==========================================
# CẤU HÌNH GMAIL SMTP (CHUYỂN HẲN SANG SSL CỔNG 465)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=465

spring.mail.username=${SPRING_MAIL_USERNAME:hongquanvjp@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:mrtvgdrwreeptmzp}

# Bật xác thực và ép hệ thống dùng SSL thay vì STARTTLS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# Bộ Socket cấu hình bắt buộc riêng cho cổng 465 trên Cloud
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# Cấu hình thời gian chờ tối đa 5 giây phòng hờ nghẽn mạng
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000