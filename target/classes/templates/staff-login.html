<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng Nhập Nhân Viên — Xanh Đi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        .float { animation: float 6s ease-in-out infinite; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#01261f] via-[#0a3d2e] to-[#1a5c45] flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Decorative blobs -->
    <div class="absolute top-[-80px] left-[-80px] w-[340px] h-[340px] bg-[#3b6934]/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-100px] right-[-60px] w-[380px] h-[380px] bg-[#bcf0ae]/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute top-[40%] left-[15%] w-[200px] h-[200px] bg-[#eab308]/5 rounded-full blur-2xl pointer-events-none float"></div>

    <div class="w-full max-w-md fade-in">
        <!-- Logo / Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-[#3b6934] rounded-2xl shadow-lg mb-4">
                <span class="material-symbols-outlined text-white text-4xl">eco</span>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Xanh Đi</h1>
            <p class="text-white/60 mt-1 text-sm font-medium">Cổng quản lý nội bộ</p>
        </div>

        <!-- Card -->
        <div class="glass bg-white/10 border border-white/20 rounded-3xl p-8 shadow-[0_8px_40px_rgba(0,0,0,0.4)]">
            <h2 class="text-xl font-bold text-white mb-6">Đăng nhập nhân viên</h2>

            <!-- Error Banner -->
            <div th:if="${loginError}"
                 class="mb-5 bg-red-500/20 border border-red-400/40 text-red-200 px-4 py-3 rounded-xl flex items-center gap-3 text-sm">
                <span class="material-symbols-outlined text-[20px] shrink-0">warning</span>
                <span th:text="${loginError}"></span>
            </div>

            <form th:action="@{/staff/login}" method="post" class="flex flex-col gap-5">

                <!-- Username -->
                <div class="flex flex-col gap-2">
                    <label for="username" class="text-white/80 text-sm font-semibold">Tên đăng nhập</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-white/40 text-[20px]">person</span>
                        <input type="text" id="username" name="username" required autocomplete="username"
                               placeholder="admin"
                               class="w-full bg-white/10 border border-white/20 text-white placeholder-white/30 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-[#bcf0ae] focus:ring-1 focus:ring-[#bcf0ae]/40 transition"/>
                    </div>
                </div>

                <!-- Password -->
                <div class="flex flex-col gap-2">
                    <label for="password" class="text-white/80 text-sm font-semibold">Mật khẩu</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-white/40 text-[20px]">lock</span>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                               placeholder="••••••••"
                               class="w-full bg-white/10 border border-white/20 text-white placeholder-white/30 rounded-xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:border-[#bcf0ae] focus:ring-1 focus:ring-[#bcf0ae]/40 transition"/>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full mt-1 bg-[#3b6934] hover:bg-[#4a8242] text-white font-bold py-3.5 rounded-xl transition-all duration-300 hover:scale-[1.02] hover:shadow-lg flex items-center justify-center gap-2 text-sm">
                    <span class="material-symbols-outlined text-[20px]">login</span>
                    Đăng nhập
                </button>
            </form>
        </div>

        <!-- Back link -->
        <div class="text-center mt-6">
            <a href="/" class="text-white/50 hover:text-white/80 text-sm transition-colors flex items-center justify-center gap-1.5">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Về trang chủ
            </a>
        </div>
    </div>

</body>
</html>
