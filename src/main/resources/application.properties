# Disable template caching for development hot-reloading
spring.thymeleaf.cache=false

# Server Port Configuration
server.port=8080

# ==========================================
# CẤU HÌNH KẾT NỐI SUPABASE (POSTGRESQL)
# ==========================================

# 1. Nhớ thay "MÃ_DỰ_ÁN_CỦA_BẠN" bằng chuỗi ký tự thực tế trên Supabase của ông
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres

# 2. Tài khoản mặc định (kèm theo mã dự án khi dùng Pooler để hỗ trợ mạng IPv4)
spring.datasource.username=postgres.ustnundvxlmxrxdavbym

# 3. Nhớ thay đúng mật khẩu dự án Supabase của ông vào đây
spring.datasource.password=Hongquan@123

spring.datasource.driver-class-name=org.postgresql.Driver

# 4. Ép trực tiếp Dialect để Hibernate không cần phải tự dò qua metadata nữa
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 5. Các cấu hình bổ sung hỗ trợ debug
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true